<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actions — RPL</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="help.js"></script>
</head>
<body class="page">
  <header class="topbar">
    <a class="brand" href="index.html">RPL</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="plan-view.html">Plans</a>
      <a href="action-detail.html" class="active">Actions</a>
      <a href="ledger-view.html">Ledger</a>
      <a href="report.html">Report</a>
    </nav>
  </header>
  <main class="main">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="card-title" style="margin:0">Action Lifecycle</p>
        <button class="help-btn" onclick="showHelp(event, this, 'actions')">? Know more</button>
      </div>
      <div class="field">
        <label for="actionId">Action ID</label>
        <input id="actionId" type="number" value="104" min="1">
      </div>
      <p class="card-sub" style="margin-bottom:8px">Week 1 transitions</p>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="transition('implement')">Implement</button>
        <button class="btn btn-ghost"   onclick="suspendAction()">Suspend</button>
        <button class="btn btn-ghost"   onclick="transition('resume')">Resume</button>
        <button class="btn btn-ghost"   onclick="transition('complete')">Complete</button>
        <button class="btn btn-danger"  onclick="transition('abandon')">Abandon</button>
      </div>
      <p class="card-sub" style="margin-bottom:8px">Week 2 transitions</p>
      <div class="actions-row">
        <button class="btn btn-primary" onclick="transition('submitforapproval')">Submit for Approval</button>
        <button class="btn btn-ghost"   onclick="transition('approve')">Approve</button>
        <button class="btn btn-ghost"   onclick="transition('reject')">Reject</button>
        <button class="btn btn-ghost"   onclick="transition('reopen')">Reopen</button>
      </div>
      <pre id="output">Run a transition to see the response.</pre>
    </div>
    <div class="card">
      <p class="card-title">Add Resource Allocation</p>
      <div class="field">
        <label for="resTypeId">Resource type ID</label>
        <input id="resTypeId" type="number" value="3" min="1" style="width:100px">
        <label for="allocQty">Quantity</label>
        <input id="allocQty" type="number" value="500" min="0.01" step="any" style="width:120px">
        <button class="btn btn-primary" onclick="addAllocation()">Add Allocation</button>
      </div>
    </div>
  </main>
  <script>
    async function transition(eventName) {
      const id = document.getElementById("actionId").value;
      const out = document.getElementById("output");
      out.textContent = "Loading...";
      try {
        const res = await fetch(`${API_BASE}/api/actions/${id}/${eventName}`, { method: "POST" });
        const text = await res.text();
        try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
        catch { out.textContent = text; }
      } catch (e) { out.textContent = "Error: " + e.message; }
    }

    async function suspendAction() {
      const id = document.getElementById("actionId").value;
      const out = document.getElementById("output");
      out.textContent = "Loading...";
      try {
        const res = await fetch(`${API_BASE}/api/actions/${id}/suspend`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ reason: "Paused from UI" }) });
        const text = await res.text();
        try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
        catch { out.textContent = text; }
      } catch (e) { out.textContent = "Error: " + e.message; }
    }

    async function addAllocation() {
      const id = document.getElementById("actionId").value;
      const out = document.getElementById("output");
      out.textContent = "Loading...";
      try {
        const res = await fetch(`${API_BASE}/api/actions/${id}/allocations`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ resourceTypeId: Number(document.getElementById("resTypeId").value), quantity: Number(document.getElementById("allocQty").value), kind: "GENERAL", assetId: null }) });
        const text = await res.text();
        try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
        catch { out.textContent = text; }
      } catch (e) { out.textContent = "Error: " + e.message; }
    }
  </script>
</body>
</html>
