services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpl
      POSTGRES_USER: rpl_user
      POSTGRES_PASSWORD: rpl_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpl_user -d rpl"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rpl
      SPRING_DATASOURCE_USERNAME: rpl_user
      SPRING_DATASOURCE_PASSWORD: rpl_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
