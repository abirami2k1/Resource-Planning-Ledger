<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plans — RPL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <header class="topbar">
    <a class="brand" href="index.html">RPL</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="plan-view.html" class="active">Plans</a>
      <a href="action-detail.html">Actions</a>
      <a href="ledger-view.html">Ledger</a>
      <a href="report.html">Report</a>
    </nav>
  </header>
  <main class="main">
    <div class="card">
      <p class="card-title">Plan Tree</p>
      <p class="card-sub">View the hierarchy of a plan and its actions.</p>
      <div class="field">
        <label for="planId">Plan ID</label>
        <input id="planId" type="number" value="1" min="1">
        <button class="btn btn-primary" onclick="loadPlan()">Load</button>
      </div>
      <ul class="tree" id="tree"></ul>
    </div>
  </main>
  <script>
    function statusBadge(status) {
      const s = (status || "PROPOSED").toLowerCase();
      return `<span class="badge badge-${s}">${s}</span>`;
    }

    async function loadPlan() {
      const id = document.getElementById("planId").value;
      const tree = document.getElementById("tree");
      tree.innerHTML = "";
      try {
        const plan = await fetch(`http://localhost:8080/api/plans/${id}`).then(r => r.json());
        const root = document.createElement("li");
        root.innerHTML = `<span><strong>${plan.name}</strong></span>${statusBadge(plan.status || "PROPOSED")}`;
        tree.appendChild(root);
        (plan.actions || []).forEach(action => {
          const child = document.createElement("li");
          child.className = "tree-child";
          child.innerHTML = `<span>${action.name}</span>${statusBadge(action.status)}`;
          tree.appendChild(child);
        });
      } catch {
        tree.innerHTML = `<li style="color:var(--muted)">Could not load plan.</li>`;
      }
    }
  </script>
</body>
</html>
